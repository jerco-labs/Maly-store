<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Carrito de Maly'store." />
  <title>Maly'store | Carrito</title>
  <link rel="icon" href="../img/Logo_Malystore.jpg" type="image/jpeg" />
  <link rel="stylesheet" href="../css/style.css" />
  <script defer src="../js/app.js"></script>
</head>
<body>
  <header class="site-header site-header--compact">
    <a class="brand" href="../../index.html">
      <img src="../img/Logo_Malystore.jpg" alt="Maly'store" class="brand__logo" />
      <span class="brand__name">Maly'store</span>
    </a>
    <a class="btn btn--primary" href="../../index.html">Seguir comprando</a>
  </header>

  <main class="section">
    <div class="section__head">
      <h1>Carrito de compras</h1>
      <p>Revisa tu pedido antes de enviarlo por WhatsApp.</p>
    </div>
    <div id="cartList" class="cart-list"></div>

    <div class="checkout-card">
      <div>
        <strong>Total estimado:</strong>
        <span id="cartTotal">S/ 0.00</span>
      </div>
      <div class="checkout-actions">
        <button class="btn btn--secondary" id="clearCartBtn" type="button">Vaciar carrito</button>
        <button class="btn btn--primary" id="checkoutBtn" type="button">Finalizar por WhatsApp</button>
      </div>
    </div>

    <div class="payments" id="pagos">
      <div class="payment-box">
        <h2>Yape</h2>
        <img src="../img/Yape_qr_melody.png" alt="Código QR Yape" />
      </div>
      <div class="payment-box">
        <h2>Plin</h2>
        <img src="../img/Plin_qr_melody.png" alt="Código QR Plin" />
      </div>
    </div>
  </main>
</body>
</html>
