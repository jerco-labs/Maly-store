<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Catálogo de Maly'store." />
  <title>Maly'store | Catálogo</title>
  <link rel="icon" href="../img/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/style.css" />
  <script defer src="../js/app.js"></script>
</head>
<body>
  <header class="site-header site-header--compact">
    <a class="brand" href="../index.html">
      <img src="../img/logo.svg" alt="Maly'store" class="brand__logo" />
      <span class="brand__name">Maly'store</span>
    </a>
    <div class="header-actions">
      <button class="btn btn--ghost" id="themeToggle" type="button">🌙</button>
      <a class="btn btn--primary" href="carrito.html">🛒 Carrito <span id="cartCount">0</span></a>
    </div>
  </header>

  <main class="section">
    <div class="section__head">
      <h1 id="pageTitle">Catálogo</h1>
      <p id="pageSubtitle">Explora los productos disponibles.</p>
    </div>

    <div class="filters">
      <input id="searchInput" class="input" type="search" placeholder="Buscar por nombre, color o marca" />
      <select id="priceFilter" class="input">
        <option value="">Todos los precios</option>
        <option value="low">Menor a mayor</option>
        <option value="high">Mayor a menor</option>
      </select>
    </div>

    <div class="grid" id="catalogGrid"></div>
  </main>
</body>
</html>
