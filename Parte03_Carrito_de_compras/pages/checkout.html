<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maly'store | Checkout</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script defer src="../js/app.js"></script>
</head>
<body>
  <header class="site-header site-header--compact">
    <a class="brand" href="../index.html"><img src="../img/logo.svg" alt="Maly'store" class="brand__logo" /><span class="brand__name">Maly'store</span></a>
    <div class="header-actions">
      <button class="btn btn--ghost" id="themeToggle" type="button">🌙</button>
      <a class="btn btn--primary" href="carrito.html">🛒 Carrito <span id="cartCount">0</span></a>
    </div>
  </header>
  <main class="section">
  <div class="catalog-title"><div><h1>Checkout</h1><p>Resumen de compra y pagos.</p></div></div>
  <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(240px,1fr));">
    <article class="page-card">
      <h2>Yape</h2>
      <img src="../img/qr-yape.svg" alt="QR Yape" />
      <p>Escanea tu código QR y envía el comprobante por WhatsApp.</p>
    </article>
    <article class="page-card">
      <h2>Plin</h2>
      <img src="../img/qr-plin.svg" alt="QR Plin" />
      <p>Escanea tu código QR y coordina la entrega.</p>
    </article>
  </div>
  <div class="checkout-card">
    <div><strong>Total:</strong> <span id="cartTotal">S/ 0.00</span></div>
    <button class="btn btn--primary" id="checkoutBtn" type="button">Confirmar por WhatsApp</button>
  </div>
</main>
</body>
</html>
